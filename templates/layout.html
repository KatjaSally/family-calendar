<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Coordination App</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <style>
        :root {
            --page-bg: #EEF1EE;
            --card-bg: #F6F4F1;
            --card-border: #D8D1D6;
            --text-main: #3E3A40;
            --text-soft: #6E6870;
            --link: #A78F9A;
            --link-hover: #8FA3A1;
            --shadow-soft: 0 1px 2px rgba(62, 58, 64, 0.06);
            --input-bg: #FBFAF8;
            --button-bg: #E8E0E4;
            --button-hover: #DDD2D8;
            --table-head-bg: #ECE8E5;
            --table-cell-bg: #FAF8F6;
            --line-soft: #E4DDE1;
            --line-mid: #D8D1D6;
            --time-text: #7C757C;
            --pill-bg: #E8E0E4;
            --pill-border: #D1C4CB;
            --pill-active-bg: #A78F9A;
            --pill-active-border: #927984;

            --status-own-bg: #DCE6E5;
            --status-own-border: #8FA3A1;
            --status-shared-bg: #E6E1EA;
            --status-shared-border: #B6A7B1;
            --status-pending-bg: #F1ECE8;
            --status-pending-border: #C9BBB0;
            --status-decline-bg: #EAD9D5;
            --status-decline-border: #C8A79B;
            --status-decline-text: #6E4B44;
        }

        body.dark-mode {
            --page-bg: #2F2A24;
            --card-bg: #3C342D;
            --card-border: #5A4E43;
            --text-main: #EEE6DA;
            --text-soft: #C9BFB1;
            --link: #8C6F5A;
            --link-hover: #7C8A6A;
            --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.24);
            --input-bg: #463D35;
            --button-bg: #51463D;
            --button-hover: #5C5046;
            --table-head-bg: #473E36;
            --table-cell-bg: #403730;
            --line-soft: #55493F;
            --line-mid: #5A4E43;
            --time-text: #D7CDBF;
            --pill-bg: #51463D;
            --pill-border: #66584C;
            --pill-active-bg: #8C6F5A;
            --pill-active-border: #A2836D;

            --status-own-bg: #6A7A71;
            --status-own-border: #8EA198;
            --status-shared-bg: #6A5C55;
            --status-shared-border: #8C7A70;
            --status-pending-bg: #4B433D;
            --status-pending-border: #7A6A5D;
            --status-decline-bg: #6E544B;
            --status-decline-border: #9E7A6A;
            --status-decline-text: #F4E5DD;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Atkinson Hyperlegible", system-ui, -apple-system, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 16px 48px;
            line-height: 1.5;
            background: var(--page-bg);
            color: var(--text-main);
        }

        h1, h2, h3, h4 {
            margin-top: 0;
            margin-bottom: 14px;
            color: var(--text-main);
        }

        h2 {
            margin-bottom: 24px;
        }

        p, li, label, th, td {
            color: var(--text-main);
        }

        a {
            color: var(--link);
            word-break: break-word;
        }

        a:hover {
            color: var(--link-hover);
        }

        form {
            margin-bottom: 0;
        }

        input, select, button {
            padding: 12px 14px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            background: var(--input-bg);
            color: var(--text-main);
            font: inherit;
        }

        input, select {
            width: 100%;
            max-width: 420px;
        }

        button {
            cursor: pointer;
            background: var(--button-bg);
            min-height: 44px;
        }

        button:hover {
            background: var(--button-hover);
        }

        .compact-button {
            width: auto;
            min-height: 0;
            padding: 6px 10px;
            margin: 0;
            font-size: 0.92rem;
            line-height: 1.1;
            border-radius: 999px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            vertical-align: middle;
        }

        ul {
            padding-left: 24px;
        }

        li {
            margin-bottom: 8px;
        }

        table {
            background: var(--card-bg);
        }

        dialog::backdrop {
            background: rgba(20, 16, 12, 0.45);
        }

        .page-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow-soft);
        }

        .list-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .list-row form {
            margin: 0;
        }

        .danger-button {
            width: auto;
            min-height: 0;
            margin: 0;
            padding: 8px 12px;
            border-radius: 999px;
            background: transparent;
            border: 1px solid var(--status-decline-border);
            color: var(--status-decline-text);
        }

        .danger-button:hover {
            background: var(--status-decline-bg);
        }

        .status-message {
            padding: 12px 14px;
            border-radius: 12px;
            background: var(--status-own-bg);
            border: 1px solid var(--status-own-border);
        }

        .tight-card {
            padding: 16px;
        }

        .section-space {
            margin-top: 8px;
        }

        .muted {
            color: var(--text-soft);
        }

        .inline-links {
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            row-gap: 8px;
        }

        .inline-links a {
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            padding: 6px 0;
        }

        .inline-links a:hover {
            text-decoration: underline;
        }

        .select-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .select-row select {
            width: auto;
            min-width: 100px;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
        }

        .scroll-x {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .scroll-y {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tap-list label,
        .tap-list a {
            display: inline-block;
            padding: 6px 0;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .settings-button {
            background: var(--button-bg);
            border: 1px solid var(--card-border);
            border-radius: 999px;
            padding: 8px 14px;
            color: var(--text-main);
            width: auto;
        }

        .settings-panel {
            width: min(420px, calc(100vw - 20px));
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 0;
            background: var(--card-bg);
            color: var(--text-main);
        }

        .settings-panel-inner {
            padding: 20px;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 0;
        }

        .button-pill {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid var(--pill-border);
            background: var(--pill-bg);
            color: var(--text-main);
            font-weight: 600;
            text-decoration: none;
            line-height: 1.2;
        }

        .button-pill:hover {
            background: var(--button-hover);
            color: var(--text-main);
            text-decoration: none;
        }

        .button-pill.is-active {
            background: var(--pill-active-bg);
            border-color: var(--pill-active-border);
        }

        .compact-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .compact-toolbar + .compact-toolbar {
            margin-top: 8px;
        }

        .compact-pill {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--pill-border);
            background: var(--pill-bg);
            color: var(--text-main);
            font-size: 0.92rem;
            font-weight: 600;
            line-height: 1.1;
            text-decoration: none;
        }

        .compact-pill:hover {
            background: var(--button-hover);
            color: var(--text-main);
            text-decoration: none;
        }

        .compact-pill.is-active {
            background: var(--pill-active-bg);
            border-color: var(--pill-active-border);
        }

        .compact-card {
            padding: 14px 16px;
        }

        .attention-card {
            background: var(--status-pending-bg);
            border: 1px solid var(--status-pending-border);
        }

        .pending-list {
            list-style: none;
            padding-left: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .pending-item {
            padding: 12px;
            border-radius: 12px;
            background: var(--card-bg);
            border: 1px dashed var(--status-pending-border);
        }

        .mobile-only {
            display: none;
        }

        .day-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .day-panel {
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 12px;
            background: var(--table-cell-bg);
        }

        .day-panel h4 {
            margin-bottom: 10px;
        }

        @media (max-width: 700px) {
            body {
                padding: 14px 10px 32px;
            }

            .card {
                padding: 16px;
                border-radius: 14px;
            }

            .page-stack {
                gap: 16px;
            }

            input,
            select,
            button {
                max-width: 100%;
                width: 100%;
            }

            .compact-button {
                width: auto;
            }

            .settings-button {
                width: auto;
            }

            .select-row {
                flex-direction: column;
                gap: 0;
            }

            .select-row select {
                width: 100%;
                min-width: 0;
            }

            .inline-links {
                flex-direction: column;
                align-items: flex-start;
            }

            .button-group {
                flex-direction: column;
                align-items: stretch;
            }

            .button-pill {
                width: 100%;
            }

            .list-row {
                align-items: flex-start;
            }

            .desktop-only {
                display: none;
            }

            .mobile-only {
                display: block;
            }

            ul {
                padding-left: 20px;
            }

            dialog {
                width: calc(100vw - 20px) !important;
                max-width: none !important;
                margin: 10px;
            }

            .form-actions {
                flex-direction: column;
            }

            .form-actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body class="{% if user is defined and user.theme == 'dark' %}dark-mode{% endif %}">
    <div class="page-stack">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
